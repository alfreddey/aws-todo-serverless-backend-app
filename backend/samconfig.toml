version = 0.1

[default.deploy.parameters]
stack_name = "serverless-todo-java"
resolve_s3 = true
s3_prefix = "serverless-todo-java"
capabilities = "CAPABILITY_IAM"
parameter_overrides = "ProjectName=\"serverless-todo-java\" GitHubRepositoryUrl=\"https://github.com/alfreddey/aws-serverless-todo-frontend-app\" GitHubBranchName=\"main\""
image_repositories = []
confirm_changeset = true

[default.global.parameters]
region = "eu-north-1"
